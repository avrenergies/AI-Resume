server {
    listen 80;
    server_name api.avrenergies.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.avrenergies.com;

    # --- SSL (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/api.avrenergies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.avrenergies.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # --- Security headers ---
    add_header X-Frame-Options          DENY;
    add_header X-Content-Type-Options   nosniff;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Upload limit matches API (10 MB) ---
    client_max_body_size 11M;

    # --- Proxy ---
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Rate limit at nginx level too (belt-and-suspenders) ---
    limit_req_zone $binary_remote_addr zone=resume_api:10m rate=30r/m;
    location /parse-resume {
        limit_req zone=resume_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
